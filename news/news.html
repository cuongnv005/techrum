<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>News Aggregator</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../main.css" />
  </head>

  <body>
    <nav class="navbar">
      <div class="nav-left">
        <button id="menuBtn" class="menu-btn">☰</button>
        <a href="/"><div class="logo">TECHRUM</div></a>
        <a href="/">Home</a>
        <a href="/news/news.html" class="active-link">News</a>
        <a href="/news/saved.html">Saved</a>
        <a href="/news/deals.html">Deals</a>
        <a href="/news/ios.html">iOS</a>
        <a href="/news/android.html">Android</a>
        <a href="/tools/buildImg.html">Image</a>
      </div>

      <div class="nav-center">
        <a href="/" class="logo mobile-logo">TECHRUM<span>.</span></a>
      </div>

      <div class="nav-right">
        <button id="themeToggle" class="theme-toggle is-pc">🌙</button>

        <button
          id="menuBtnRight"
          class="menu-btn"
          onclick="toggleRightSidebar()"
        >
          ☰
        </button>
      </div>
    </nav>
    <div class="news-shell">
      <div class="news-sidebar" id="newsSidebar">
        <div class="sidebar-header">
          <h3>Nguồn tin</h3>
          <button class="add-btn" onclick="openAdd()">+</button>
        </div>

        <div id="sourcesLoading" class="loading">
          <div class="spinner"></div>
          Đang tải nguồn tin...
        </div>

        <div id="sources"></div>
      </div>

      <div id="sidebarRight" class="sidebar-right">
        <a href="/">🏠 Home</a>
        <a href="/news/news.html">📰 News</a>
        <a href="/news/saved.html">💾 Saved</a>
        <a href="/news/deals.html">🏷️ Deals</a>
        <a href="/news/ios.html">🍎 iOS</a>
        <a href="/news/android.html">📱Android</a>
        <a href="/tools/buildImg.html">🖼️ Image</a>
        <a id="themeToggle">🌙Dark mode</a>
      </div>

      <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

      <div class="news-content">
        <h2 id="pageTitle">Chọn nguồn tin</h2>

        <div id="newsLoading" class="loading">
          <div class="spinner"></div>
          Đang tải bài viết...
        </div>

        <div class="news-grid" id="news"></div>

        <div class="pagination" id="pagination"></div>

        <div class="loadmore-wrap">
          <button id="loadmoreBtn" class="loadmore" onclick="loadMore()">
            Load More
          </button>
        </div>
      </div>
    </div>

    <!-- MODAL -->

    <div class="modal" id="modal">
      <div class="modal-box">
        <h3 id="modalTitle">Thêm nguồn tin</h3>

        <input id="name" placeholder="Tên nguồn" />
        <input id="logo" placeholder="Logo URL" />
        <input id="url" placeholder="RSS URL" />
        <label
          style="
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 10px;
          "
        >
          <input type="checkbox" id="isBot" />
          Site bị Cloudflare bot check
        </label>

        <div class="modal-actions">
          <button onclick="saveSource()">Lưu</button>
          <button onclick="closeModal()">Hủy</button>
        </div>
      </div>
    </div>

    <script>
      const API = "https://getnews.cuongnv.workers.dev";

      let sourcesData = [];
      let currentSource = null;
      let currentPage = 1;
      let totalPages = 1;
      let limit = 10;
      let editingId = null;

      function getArticleLink(article) {
        return (
          article?.link ||
          article?.url ||
          article?.original_link ||
          article?.originalLink ||
          article?.source_url ||
          article?.sourceUrl ||
          ""
        );
      }

      function normalizeExternalUrl(url) {
        const cleaned = (url || "").trim();
        if (!cleaned) return "";
        if (/^https?:\/\//i.test(cleaned)) return cleaned;
        if (/^\/\//.test(cleaned)) return "https:" + cleaned;
        if (/^[a-z]+:/i.test(cleaned)) return cleaned;
        return "https://" + cleaned;
      }

      function openExternalLink(url) {
        const safeUrl = normalizeExternalUrl(url);
        if (!safeUrl) return false;

        const popup = window.open(safeUrl, "_blank", "noopener,noreferrer");
        if (popup) {
          return true;
        }

        const a = document.createElement("a");
        a.href = safeUrl;
        a.target = "_blank";
        a.rel = "noopener noreferrer";
        a.style.display = "none";
        document.body.appendChild(a);
        a.click();
        a.remove();

        // Edge/prod có thể chặn mở tab mới mà không báo lỗi.
        // Fallback cuối cùng: mở cùng tab để user vẫn vào được bài.
        setTimeout(() => {
          if (document.visibilityState === "visible") {
            window.location.assign(safeUrl);
          }
        }, 120);

        return true;
      }

      // ================= MODAL =================

      function openAdd() {
        editingId = null;
        modalTitle.innerText = "Thêm nguồn tin";
        name.value = logo.value = url.value = "";
        isBot.checked = false;
        modal.style.display = "flex";
      }

      function openEdit(s) {
        editingId = s.id;
        modalTitle.innerText = "Sửa nguồn tin";
        name.value = s.name;
        logo.value = s.logo || "";
        url.value = s.url;
        isBot.checked = s.isBot || false;
        modal.style.display = "flex";
      }

      function closeModal() {
        modal.style.display = "none";
      }

      // ================= SAVE =================

      async function saveSource() {
        const payload = {
          name: document.getElementById("name").value.trim(),
          logo: document.getElementById("logo").value.trim(),
          url: document.getElementById("url").value.trim(),
          isBot: document.getElementById("isBot").checked,
        };

        if (editingId) {
          await fetch(API + "/sources/" + editingId, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
        } else {
          await fetch(API + "/sources", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
        }

        closeModal();
        loadSources();
      }

      // ================= DELETE =================

      async function deleteSource(id) {
        if (!confirm("Xóa nguồn tin?")) return;

        await fetch(API + "/sources/" + id, { method: "DELETE" });

        if (currentSource?.id === id) {
          currentSource = null;
          news.innerHTML = "";
          pageTitle.innerText = "Chọn nguồn tin";
        }

        loadSources();
      }

      // ================= LOAD SOURCES =================

      async function loadSources() {
        document.getElementById("sourcesLoading")?.classList.add("show");
        const res = await fetch(API + "/sources");
        sourcesData = await res.json();

        const box = document.getElementById("sources");
        box.innerHTML = "";

        sourcesData.forEach((s) => {
          const div = document.createElement("div");
          div.className = "source";

          if (currentSource?.id === s.id) div.classList.add("active");

          div.innerHTML = `
      <div class="source-left">
        <img src="${s.logo || ""}">
        <span>${s.name} ${s.isBot ? "⭐" : ""}</span>
      </div>

      <div class="source-actions">
        <button class="icon-btn edit" title="Sửa" aria-label="Sửa"
          onclick='event.stopPropagation(); openEdit(${JSON.stringify(s)})'>✏️</button>
        <button class="icon-btn delete" title="Xoá" aria-label="Xoá"
          onclick='event.stopPropagation(); deleteSource("${s.id}")'>🗑️</button>
      </div>
    `;

          div.onclick = () => selectSource(s);

          box.appendChild(div);
        });
        if (!currentSource && sourcesData.length > 0) {
          selectSource(sourcesData[0]);
        }
        document.getElementById("sourcesLoading")?.classList.remove("show");
      }

      // ================= SELECT SOURCE =================

      function selectSource(source) {
        currentSource = source;
        currentPage = 1;

        pageTitle.innerText = source.name;

        scrollTopMobile();

        document
          .querySelectorAll(".source")
          .forEach((el) => el.classList.remove("active"));

        const idx = sourcesData.findIndex((s) => s.id === source.id);
        document.querySelectorAll(".source")[idx]?.classList.add("active");

        if (window.innerWidth <= 768) {
          closeSidebar();
        }

        loadNews();
      }

      // ================= LOAD NEWS =================

      async function loadNews(append = false) {
        if (!currentSource) return;
        document.getElementById("newsLoading")?.classList.add("show");

        let data;
        try {
          const res = await fetch(
            `${API}/?url=${encodeURIComponent(currentSource.url)}&page=${currentPage}&limit=${limit}`,
          );
          data = await res.json();
        } finally {
          document.getElementById("newsLoading")?.classList.remove("show");
        }

        if (!append) {
          news.innerHTML = "";
        }

        data.articles.forEach((n) => {
          const div = document.createElement("div");
          div.className = "news-item";

          div.innerHTML = `
  <img src="${n.image}">
  <h4>${n.title_vi || n.title}</h4>

  <div class="item-overlay">
    <button class="overlay-btn open-btn">🚀</button>
    <button class="overlay-btn convert-btn">🔗</button>
    <button class="overlay-btn save-btn">💾</button>
  </div>
`;

          const openBtn = div.querySelector(".open-btn");
          const convertBtn = div.querySelector(".convert-btn");
          const saveBtn = div.querySelector(".save-btn");

          openBtn.onclick = (e) => {
            e.stopPropagation();
            const articleLink = getArticleLink(n);
            if (!articleLink) {
              alert("Không tìm thấy link bài viết gốc");
              return;
            }
            if (!openExternalLink(articleLink)) {
              alert("Không mở được bài gốc");
            }
          };

          convertBtn.onclick = (e) => {
            e.stopPropagation();

            const articleLink = getArticleLink(n);
            if (!articleLink) {
              alert("Không tìm thấy link để chuyển đổi");
              return;
            }
            const encoded = encodeURIComponent(articleLink);

            let url = `/?url=${encoded}`;

            if (currentSource?.isBot) {
              url += "&bot=1";
            }

            window.open(url, "_blank");
          };

          saveBtn.onclick = async (e) => {
            e.stopPropagation();
            console.log(1);

            if (!currentSource) return;

            const payload = {
              title: n.title_vi || "",
              link: normalizeExternalUrl(getArticleLink(n)),
              image: n.image,
              source_id: currentSource.id,
            };

            try {
              const res = await fetch(API + "/saved", {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                },
                body: JSON.stringify(payload),
              });

              const data = await res.json();

              if (res.ok) {
                saveBtn.innerHTML = "⭐";
                saveBtn.style.background = "#ffd700";
                alert("Đã lưu bài viết thành công");
              } else {
                alert("Bài này đã từng lưu rồi!");
              }
            } catch (err) {
              console.error(err);
              alert("Lỗi khi lưu");
            }
          };

          news.appendChild(div);
        });

        totalPages = Math.ceil(data.total / limit);

        renderPagination();
      }

      // ================= PAGINATION =================

      function renderPagination() {
        const box = document.getElementById("pagination");
        box.innerHTML = "";

        function createBtn(label, page, disabled = false, active = false) {
          const btn = document.createElement("button");
          btn.innerText = label;

          if (active) btn.classList.add("active");
          if (disabled) btn.classList.add("disabled");

          btn.onclick = () => {
            currentPage = page;
            scrollTopMobile();
            loadNews();
          };

          box.appendChild(btn);
        }

        // Prev
        createBtn("←", currentPage - 1, currentPage === 1);

        let start = Math.max(1, currentPage - 2);
        let end = Math.min(totalPages, currentPage + 2);

        if (start > 1) {
          createBtn(1, 1);
          if (start > 2) {
            const dots = document.createElement("span");
            dots.innerText = "...";
            box.appendChild(dots);
          }
        }

        for (let i = start; i <= end; i++) {
          createBtn(i, i, false, i === currentPage);
        }

        if (end < totalPages) {
          if (end < totalPages - 1) {
            const dots = document.createElement("span");
            dots.innerText = "...";
            box.appendChild(dots);
          }
          createBtn(totalPages, totalPages);
        }

        // Next
        createBtn("→", currentPage + 1, currentPage === totalPages);
      }

      // ================= LOAD MORE =================

      function loadMore() {
        if (currentPage >= totalPages) return;

        currentPage++;

        loadNews(true).then(() => {
          scrollToPageStart(currentPage);
        });
      }

      // ================= INIT =================

      loadSources();

      const menuBtn = document.getElementById("menuBtn");

      menuBtn.addEventListener("click", () => {
        document.getElementById("newsSidebar").classList.toggle("open");
        document.getElementById("overlay").classList.toggle("show");
      });

      function closeSidebar() {
        document.getElementById("newsSidebar").classList.remove("open");
        document.getElementById("sidebarRight").classList.remove("open");
        document.getElementById("overlay").classList.remove("show");
      }

      function checkMobile() {
        if (window.innerWidth <= 768) {
          menuBtn.style.display = "inline-block";
        } else {
          menuBtn.style.display = "none";
          document.getElementById("newsSidebar").classList.remove("open");
        }
      }

      window.addEventListener("resize", checkMobile);
      checkMobile();

      const themeToggle = document.getElementById("themeToggle");

      if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark");
        themeToggle.textContent = "☀️";
      }

      themeToggle.addEventListener("click", () => {
        document.body.classList.toggle("dark");

        const isDark = document.body.classList.contains("dark");

        localStorage.setItem("theme", isDark ? "dark" : "light");

        themeToggle.textContent = isDark ? "☀️" : "🌙";
      });

      function toggleRightSidebar() {
        const sidebar = document.getElementById("sidebarRight");
        const overlay = document.getElementById("overlay");

        sidebar.classList.toggle("open");
        overlay.classList.toggle("show");
      }

      function scrollTopMobile() {
        if (window.innerWidth <= 768) {
          // MOBILE → scroll toàn trang
          document.documentElement.scrollTop = 0;
          document.body.scrollTop = 0;

          window.scrollTo({
            top: 0,
            behavior: "smooth",
          });
        } else {
          // PC → scroll container
          const content = document.querySelector(".news-content");
          content?.scrollTo({
            top: 0,
            behavior: "smooth",
          });
        }
      }
      function scrollToPageStart(page) {
        const items = document.querySelectorAll(".news-item");

        const index = (page - 1) * limit;

        if (items[index]) {
          items[index].scrollIntoView({
            behavior: "smooth",
            block: "start",
          });
        }
      }
    </script>
  </body>
</html>
