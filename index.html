<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TECHRUM Converter</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/main.css" />

    <style>
      body {
        margin: 0;
        font-family: Arial;
        background: var(--bg);
        color: var(--text);
        transition: 0.3s;
        padding: 40px;
        max-width: 900px;
        margin: auto;
        transition: 0.3s;
        height: 100vh;
      }

      h1 {
        text-align: center;
      }

      body {
        padding-top: 80px;
      }

      input,
      textarea,
      button {
        width: 100%;
        box-sizing: border-box;
      }
      input {
        padding: 12px;
        margin: 15px 0;
        font-size: 16px;
        background: var(--card);
        color: var(--text);
        border: 1px solid var(--border);
      }

      textarea {
        height: 250px;
        padding: 12px;
        margin-top: 15px;
        background: var(--card);
        color: var(--text);
        border: 1px solid var(--border);
        resize: vertical;
      }

      button {
        padding: 12px;
        background: var(--button);
        color: white;
        border: none;
        cursor: pointer;
        font-weight: bold;
        margin-top: 10px;
      }

      button:hover {
        background: var(--button-hover);
      }

      select {
        padding: 12px;
        margin-bottom: 10px;
        background: var(--card);
        color: var(--text);
        border: 1px solid var(--border);
      }

      .row {
        display: flex;
        gap: 10px;
      }

      .row button {
        flex: 1;
      }

      .history {
        margin-top: 40px;
      }

      .history-item {
        background: var(--card);
        border: 1px solid var(--border);
        padding: 10px;
        margin-bottom: 10px;
        border-radius: 6px;
      }

      .history-item small {
        opacity: 0.6;
      }

      .history-buttons {
        display: flex;
        gap: 5px;
        margin-top: 5px;
      }

      .output-wrapper {
        position: relative;
      }

      #outputArea {
        height: 300px;
        padding: 12px;
        padding-right: 90px;
        font-size: 15px;
        resize: vertical;
      }

      .output-actions {
        position: absolute;
        top: 8px;
        right: 8px;
        display: flex;
        gap: 6px;
      }

      .output-actions button {
        width: auto;
        padding: 6px 10px;
        font-size: 13px;
        border-radius: 6px;
        cursor: pointer;
      }

      /* ===== SIDEBAR ===== */

      .menu-btn {
        position: fixed;
        left: 20px;
        width: auto;
        padding: 8px 12px;
        font-size: 20px;
        border-radius: 8px;
        z-index: 1001;
        margin-top: 0 !important;
      }

      /* ===== SIDEBAR ===== */

      .sidebar {
        position: fixed;
        top: 0;
        left: -300px;
        width: 250px;
        height: 100%;
        background: var(--card);
        border-right: 1px solid var(--border);
        padding: 60px 20px;
        transition: 0.3s ease;
        z-index: 1002;
      }

      .sidebar.active {
        left: 0;
      }

      .sidebar a {
        display: block;
        padding: 12px;
        margin-bottom: 10px;
        text-decoration: none;
        color: var(--text);
        border-radius: 6px;
      }

      .sidebar a:hover {
        background: var(--border);
      }

      .overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.4);
        opacity: 0;
        visibility: hidden;
        transition: 0.3s;
        z-index: 999;
      }

      .overlay.active {
        opacity: 1;
        visibility: visible;
      }

      .overlay.show {
        display: block;
      }
      .engine-badge {
        font-size: 12px;
        padding: 2px 6px;
        margin-left: 6px;
        border-radius: 6px;
        background: var(--bg);
      }
      .engine-badge.gemini {
        color: #009e5c;
      }

      .engine-badge.openai {
        color: #1a73e8;
      }
    </style>
  </head>

  <body>
    <nav class="navbar">
      <div class="nav-left">
        <button id="menuBtn" class="menu-btn">☰</button>
        <a href="/"><div class="logo">TECHRUM</div></a>
        <a href="/" class="active-link">Home</a>
        <a href="/news/news.html">News</a>
        <a href="/news/saved.html">Saved</a>
        <a href="/news/deals.html">Deals</a>
        <a href="/news/ios.html">iOS</a>
        <a href="/news/android.html">Android</a>
        <a href="/tools/buildImg.html">Image</a>
        <a href="/tools/facebook.html">Lịch FB</a>
      </div>

      <div class="nav-center">
        <a href="/"><div class="logo mobile-logo">TECHRUM</div></a>
      </div>

      <div class="nav-right">
        <button id="themeToggle" class="theme-toggle">🌙</button>
      </div>
    </nav>
    <div id="sidebar" class="sidebar">
      <a href="/">🏠 Home</a>
      <a href="/news/news.html">📰 News</a>
      <a href="/news/saved.html">💾 Saved</a>
      <a href="/news/deals.html">🏷️ Deals</a>
      <a href="/news/ios.html">🍎 iOS</a>
      <a href="/news/android.html">📱Android</a>
      <a href="/tools/buildImg.html">🖼️ Image</a>
      <a href="/tools/facebook.html">📅 Lịch FB</a>
    </div>

    <div id="overlay" class="overlay"></div>

    <h1>TECHRUM Article Converter</h1>

    <input id="urlInput" type="text" placeholder="Nhập URL bài viết…" />
    <div class="row">
      <select id="engineSelect">
        <option value="openrouter">OpenRouter</option>
        <option value="gemini">Gemini</option>
        <option value="openai">OpenAI</option>
        <option value="workersai">Workers AI</option>
      </select>
      <select id="modelSelect" style="display:none">
        <option value="@cf/meta/llama-3.3-70b-instruct-fp8-fast">Qwen 3 70B</option>
        <option value="@cf/google/gemma-3-12b-it">Gemma 3 12B</option>
      </select>
    </div>
    <div class="row">
      <button id="convertBtn">Convert</button>
    </div>

    <div id="loadingText" class="loading">
      <div class="spinner"></div>
      Đang xử lý...
    </div>

    <div class="output-wrapper">
      <textarea
        id="outputArea"
        placeholder="Kết quả sẽ hiển thị ở đây..."
      ></textarea>

      <div class="output-actions">
        <button id="bbViewBtn">BBCode</button>
        <button id="copyBtn">📋</button>
      </div>
    </div>

    <!-- Preview area -->
    <div id="previewArea" class="preview" style="display: none"></div>

    <div class="history">
      <h2>Lịch sử</h2>
      <button id="clearHistoryBtn">Xóa toàn bộ</button>
      <div id="historyList"></div>
    </div>

    <script src="script.js"></script>
  </body>

  <script>
    const menuBtn = document.getElementById("menuBtn");
    const sidebar = document.getElementById("sidebar");
    const overlay = document.getElementById("overlay");

    menuBtn.addEventListener("click", () => {
      sidebar.classList.toggle("active");
      overlay.classList.toggle("active");
    });

    overlay.addEventListener("click", () => {
      sidebar.classList.remove("active");
      overlay.classList.remove("active");
    });
  </script>
</html>
