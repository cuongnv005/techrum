<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TECHRUM Android App Converter</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../main.css" />
  </head>

  <body>
    <!-- NAVBAR -->
    <nav class="navbar">
      <div class="nav-left">
        <button id="menuBtn" class="menu-btn">☰</button>
        <a href="/">Home</a>
        <a href="/news/news.html">News</a>
        <a href="/news/saved.html">Saved</a>
        <a href="/news/deals.html">Deals</a>
        <a href="/news/ios.html">iOS</a>
        <a href="/news/android.html" class="active-link">Android</a>
        <a href="/tools/buildImg.html">Image</a>
      </div>
      <div class="nav-center">
        <a href="/"><div class="logo mobile-logo">TECHRUM</div></a>
      </div>
      <div class="nav-right">
        <button id="themeToggle" class="theme-toggle">🌙</button>
      </div>
    </nav>

    <!-- SIDEBAR -->
    <div id="sidebar" class="sidebar">
      <a href="/">🏠 Home</a>
      <a href="/news/news.html">📰 News</a>
      <a href="/news/saved.html">💾 Saved</a>
      <a href="/news/deals.html">🏷️ Deals</a>
      <a href="/news/ios.html">🍎 iOS</a>
      <a href="/news/android.html">🤖 Android</a>
      <a href="/tools/buildImg.html">🖼️ Image</a>
    </div>
    <div id="overlay" class="overlay"></div>

    <!-- MAIN -->
    <div class="main">
      <div class="page-header">
        <div class="badge">🤖 Android</div>
        <h1>TECHRUM Android<br />BBCode Converter</h1>
        <p>Nhập Google Play URL và giá — nhận BBCode ngay lập tức</p>
      </div>

      <div id="appsContainer"></div>

      <button class="btn btn-add" id="addAppBtn">➕ Thêm App</button>

      <button class="btn btn-primary" id="convertBtn">
        <span>⚡</span> Convert
      </button>

      <div id="loadingText" class="loading">
        <div class="spinner"></div>
        Đang xử lý...
      </div>

      <div class="output-section" id="outputSection" style="display: none">
        <div class="output-header">
          <span class="output-title">Output</span>
          <div class="output-actions">
            <button class="btn-sm" id="bbViewBtn">Preview</button>
            <button class="btn-sm" id="copyBtn">📋 Copy</button>
          </div>
        </div>
        <textarea
          id="outputArea"
          placeholder="BBCode sẽ hiển thị ở đây..."
        ></textarea>
        <div id="previewArea" class="preview"></div>
      </div>
    </div>

    <script>
      const API_URL = "https://generateandroid.cuongnv.workers.dev/generate";

      /* ── ADD APP ── */
      const container = document.getElementById("appsContainer");
      let appCount = 0;

      function createApp() {
        appCount++;
        const div = document.createElement("div");
        div.className = "app-card";
        div.innerHTML = `
          <div class="app-header">
            <span class="app-label">App ${appCount}</span>
            <button class="remove-btn">✕ Xoá</button>
          </div>
          <div class="input-group">
            <div>
              <div class="field-label">Google Play URL</div>
              <input type="url" class="url" placeholder="https://play.google.com/store/apps/details?id=...">
            </div>
            <div>
              <div class="field-label">Price (vd: 5.49)</div>
              <input type="text" class="price" placeholder="5.49">
            </div>
            <div>
            <div class="field-label">Promo Code (nếu có)</div>
                <input type="text" class="code" placeholder="VD: VIP2026">
            </div>
            <div style="display:flex; align-items:center; gap:8px; margin-top:4px;">
            <input type="checkbox" class="lifetime" id="lifetime-${appCount}">
            <label for="lifetime-${appCount}" style="font-size:13px; color:var(--muted); cursor:pointer;">
                Lifetime
            </label>
            </div>
          </div>
        `;
        div.querySelector(".remove-btn").onclick = () => div.remove();
        container.appendChild(div);
      }

      document.getElementById("addAppBtn").onclick = createApp;
      createApp();

      /* ── CONVERT ── */
      const convertBtn = document.getElementById("convertBtn");
      const outputArea = document.getElementById("outputArea");
      const outputSection = document.getElementById("outputSection");
      const previewArea = document.getElementById("previewArea");
      const loadingText = document.getElementById("loadingText");

      convertBtn.addEventListener("click", async () => {
        const apps = [];

        document.querySelectorAll(".app-card").forEach((card) => {
          const url = card.querySelector(".url").value.trim();
          if (!url) return;

          const entry = { url };

          const price = card.querySelector(".price").value.trim();
          if (price) entry.price = price;

          const code = card.querySelector(".code").value.trim();
          if (code) entry.code = code;

          const lifetimeChecked = card.querySelector(".lifetime").checked;
          entry.lifetime = lifetimeChecked;
          entry.isLifetime = lifetimeChecked;
          entry.is_lifetime = lifetimeChecked;

          apps.push(entry);
        });

        if (!apps.length) {
          alert("Vui lòng nhập ít nhất 1 App URL");
          return;
        }

        loadingText.classList.add("show");
        convertBtn.disabled = true;
        outputSection.style.display = "none";

        // reset preview state
        isPreview = false;
        outputArea.style.display = "block";
        previewArea.style.display = "none";
        document.getElementById("bbViewBtn").textContent = "Preview";

        try {
          const res = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ apps }),
          });

          if (!res.ok) throw new Error("API lỗi: " + res.status);
          const text = await res.text();
          if (!text.trim()) throw new Error("API trả về rỗng");

          outputArea.value = normalizeApiOutput(text);
          outputSection.style.display = "block";
        } catch (err) {
          outputArea.value = "❌ Lỗi: " + err.message;
          outputSection.style.display = "block";
        } finally {
          loadingText.classList.remove("show");
          convertBtn.disabled = false;
        }
      });

      /* ── COPY ── */
      document.getElementById("copyBtn").addEventListener("click", async () => {
        const text = outputArea.value;
        if (!text) {
          alert("Không có nội dung để copy");
          return;
        }
        await navigator.clipboard.writeText(text);
        const btn = document.getElementById("copyBtn");
        btn.textContent = "✅ Copied";
        setTimeout(() => {
          btn.textContent = "📋 Copy";
        }, 1500);
      });

      /* ── BBCODE PREVIEW ── */
      let isPreview = false;
      document.getElementById("bbViewBtn").addEventListener("click", () => {
        if (!isPreview) {
          const bbcode = outputArea.value;
          if (!bbcode.trim()) return;
          previewArea.innerHTML = renderBBCode(bbcode);
          outputArea.style.display = "none";
          previewArea.style.display = "block";
          document.getElementById("bbViewBtn").textContent = "BBCode";
          isPreview = true;
        } else {
          outputArea.style.display = "block";
          previewArea.style.display = "none";
          document.getElementById("bbViewBtn").textContent = "Preview";
          isPreview = false;
        }
      });

      function normalizeApiOutput(text) {
        return text
          .replace(/^\s*---+\s*$/gm, "")
          .replace(/\n{3,}/g, "\n\n")
          .trim();
      }

      function renderBBCode(text) {
        return normalizeApiOutput(text)
          .replace(
            /\[IMG\](.*?)\[\/IMG\]/gi,
            '<img src="$1" style="max-width:100%;margin:5px;border-radius:6px;">',
          )
          .replace(
            /\[CENTER\]([\s\S]*?)\[\/CENTER\]/gi,
            '<div style="text-align:center">$1</div>',
          )
          .replace(
            /\[URL=['"]?(.*?)['"]?\](.*?)\[\/URL\]/gi,
            '<a href="$1" target="_blank" style="color:var(--accent)">$2</a>',
          )
          .replace(
            /\[SIZE=(.*?)\](.*?)\[\/SIZE\]/gi,
            '<span style="font-size:$1">$2</span>',
          )
          .replace(
            /\[COLOR=(.*?)\]([\s\S]*?)\[\/COLOR\]/gi,
            '<span style="color:$1">$2</span>',
          )
          .replace(/\[B\](.*?)\[\/B\]/gi, "<b>$1</b>")
          .replace(/\[S\](.*?)\[\/S\]/gi, "<s>$1</s>")
          .replace(/\n/g, "<br>");
      }

      /* ── DARK MODE ── */
      const toggleBtn = document.getElementById("themeToggle");

      function setTheme(mode) {
        document.body.classList.toggle("dark", mode === "dark");
        toggleBtn.textContent = mode === "dark" ? "☀️" : "🌙";
        localStorage.setItem("theme", mode);
      }

      setTheme(localStorage.getItem("theme") || "light");
      toggleBtn.addEventListener("click", () => {
        setTheme(document.body.classList.contains("dark") ? "light" : "dark");
      });

      /* ── SIDEBAR ── */
      const menuBtn = document.getElementById("menuBtn");
      const sidebar = document.getElementById("sidebar");
      const overlay = document.getElementById("overlay");

      menuBtn.addEventListener("click", () => {
        sidebar.classList.toggle("active");
        overlay.classList.toggle("active");
      });
      overlay.addEventListener("click", () => {
        sidebar.classList.remove("active");
        overlay.classList.remove("active");
      });
    </script>
  </body>
</html>
